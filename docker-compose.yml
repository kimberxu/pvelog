#version: '3.8'

services:
  controller:
    build:
      context: ./controller
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./controller:/app
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    environment:
      - TZ=Asia/Shanghai
    command: uvicorn api.main:app --host 0.0.0.0 --port 42791 --reload
    ports:
      - "42791:42791"
    env_file:
      - .env
    extra_hosts:
      - "h110:192.168.1.10"  # 替换成 PVE 节点 h110 真实的局域网 IP
      - "pve:192.168.1.11"
      - "songyuan:192.168.2.10"      
