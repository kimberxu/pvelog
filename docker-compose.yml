#version: '3.8'

services:
  controller:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./controller:/app
    command: >
      bash -c "pip install . && uvicorn api.main:app --host 0.0.0.0 --port 42791 --reload"
    ports:
      - "42791:42791"
    environment:
      - DB_URL=sqlite+aiosqlite:///./pve_aiops.db
      - PSK_SECRET=YOUR_SECURE_PSK_HERE
